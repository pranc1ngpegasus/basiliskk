[package]
name = "basiliskk"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1.73"
bytes = "1.5.0"
chrono = { version = "0.4.31", default-features = false, features = ["clock", "serde"] }
encoding = "0.2.33"
serde = { version = "1.0.188", features = ["serde_derive"] }
serde_json = "1.0.107"
serde_with = "3.3.0"
test-case = "3.2.1"
tokio = { version = "1.32.0", features = ["rt-multi-thread", "net", "macros"] }
tokio-stream = "0.1.14"
tokio-util = { version = "0.7.8", features = ["codec"] }
tracing = { version = "0.1.37" }
tracing-subscriber = { version = "0.3.17", features = ["json", "env-filter"] }

[profile.release]
codegen-units = 1
debug = false
lto = true
opt-level = "z"
